<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Love Memory Match 💕</title>
   <link rel="stylesheet" href="MemoryMatch.css">
</head>
<body>

   <!-- Floating hearts background -->
   <div class="hearts-bg" id="heartsBg"></div>

   <!-- NAME ENTRY SCREEN -->
   <div class="screen" id="nameScreen">
      <div class="name-card">
         <div class="name-card-header">
            <div class="title-heart">💖</div>
            <h1 class="title">Love Match</h1>
            <p class="subtitle">a game for two hearts</p>
         </div>

         <div class="name-fields">
            <div class="name-field">
               <label class="name-label p1-color">🌸 Lover 1</label>
               <input class="name-input" id="p1Name" type="text" placeholder="Your name..." maxlength="16" />
            </div>
            <div class="vs-divider">💕</div>
            <div class="name-field">
               <label class="name-label p2-color">🌹 Lover 2</label>
               <input class="name-input" id="p2Name" type="text" placeholder="Your name..." maxlength="16" />
            </div>
         </div>

         <div class="difficulty" id="nameDifficulty">
            <button class="diff-btn active" data-pairs="6">Easy</button>
            <button class="diff-btn" data-pairs="8">Medium</button>
            <button class="diff-btn" data-pairs="12">Hard</button>
         </div>

         <button class="start-btn" id="startBtn">💝 Begin Our Game</button>
         <p class="name-error" id="nameError"></p>
      </div>
   </div>

   <!-- GAME SCREEN -->
   <div class="screen hidden" id="gameScreen">
      <div class="container">
         <div class="header">
            <div class="title-heart small">💖</div>
            <h1 class="title">Love Match</h1>
         </div>

         <!-- Turn indicator -->
         <div class="turn-banner" id="turnBanner">
            <span id="turnText">Player 1's turn</span>
         </div>

         <!-- Scoreboard -->
         <div class="scoreboard">
            <div class="player-score active-player" id="p1ScoreBox">
               <div class="player-avatar p1-bg">🌸</div>
               <div class="player-info">
                  <span class="player-name" id="p1NameDisplay">Lover 1</span>
                  <span class="player-points" id="p1Points">0 💕</span>
               </div>
            </div>
            <div class="score-divider">VS</div>
            <div class="player-score" id="p2ScoreBox">
               <div class="player-info">
                  <span class="player-name" id="p2NameDisplay">Lover 2</span>
                  <span class="player-points" id="p2Points">0 💕</span>
               </div>
               <div class="player-avatar p2-bg">🌹</div>
            </div>
         </div>

         <div class="game-grid" id="gameGrid"></div>

         <button class="new-game-btn" id="newGameBtn">🔄 New Game</button>
      </div>
   </div>

   <!-- WIN MODAL -->
   <div class="modal-overlay" id="winModal">
      <div class="modal">
         <div class="modal-emoji" id="winEmoji">🏆</div>
         <h2 class="modal-title" id="winTitle">Winner!</h2>
         <p class="modal-love-msg" id="loveMsg"></p>
         <div class="final-scores" id="finalScores"></div>
         <div class="modal-buttons">
            <button class="new-game-btn" id="playAgainBtn">💝 Play Again</button>
            <button class="new-game-btn outline-btn" id="changeNamesBtn">👫 Change Players</button>
         </div>
      </div>
   </div>

   <script src="MemoryMatch.js"></script>
</body>
</html>
